  <circle cx="120" cy="60" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="200" cy="20" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="280" cy="50" r="1" fill="#fff" opacity="0.3"/>
  <circle cx="350" cy="25" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="30" cy="100" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="370" cy="90" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="160" cy="110" r="1.5" fill="#fff" opacity="0.3"/>
  <!-- Enemy Row 1 -->
  <text x="120" y="60" font-size="28" text-anchor="middle">👾</text>
  <text x="170" y="60" font-size="28" text-anchor="middle">👾</text>
  <text x="220" y="60" font-size="28" text-anchor="middle">👾</text>
  <text x="270" y="60" font-size="28" text-anchor="middle">👾</text>
  <!-- Enemy Row 2 -->
  <text x="130" y="95" font-size="28" text-anchor="middle">👽</text>
  <text x="180" y="95" font-size="28" text-anchor="middle">👽</text>
  <text x="230" y="95" font-size="28" text-anchor="middle">👽</text>
  <text x="280" y="95" font-size="28" text-anchor="middle">👽</text>
  <!-- Enemy Row 3 -->
  <text x="140" y="130" font-size="28" text-anchor="middle">🤖</text>
  <text x="190" y="130" font-size="28" text-anchor="middle">🤖</text>
  <text x="240" y="130" font-size="28" text-anchor="middle">🤖</text>
  <!-- Player bullets -->
  <circle cx="200" cy="160" r="3" fill="#ffff00"/>
  <circle cx="200" cy="148" r="3" fill="#ffff00"/>
  <!-- Player ship -->
  <text x="200" y="195" font-size="36" text-anchor="middle">🚀</text>
