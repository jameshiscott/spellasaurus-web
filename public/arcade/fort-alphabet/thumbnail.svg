<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="24" fill="url(#bg)"/>
  <!-- Castle -->
  <rect x="60" y="70" width="80" height="70" rx="4" fill="#d4a574"/>
  <rect x="70" y="50" width="16" height="30" rx="2" fill="#b8956a"/>
  <rect x="92" y="40" width="16" height="40" rx="2" fill="#b8956a"/>
  <rect x="114" y="50" width="16" height="30" rx="2" fill="#b8956a"/>
  <!-- Gate -->
  <rect x="88" y="110" width="24" height="30" rx="12" fill="#7c3aed"/>
  <!-- Flag -->
  <line x1="100" y1="25" x2="100" y2="42" stroke="#fff" stroke-width="2"/>
  <polygon points="100,25 118,32 100,38" fill="#ef4444"/>
  <!-- Letters marching -->
  <circle cx="40" cy="165" r="16" fill="#3b82f6"/>
  <text x="40" y="171" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff" font-family="sans-serif">A</text>
  <circle cx="80" cy="165" r="16" fill="#f97316"/>
  <text x="80" y="171" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff" font-family="sans-serif">C</text>
  <circle cx="120" cy="165" r="16" fill="#dc2626"/>
  <text x="120" y="171" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff" font-family="sans-serif">Z</text>
  <circle cx="160" cy="165" r="16" fill="#eab308"/>
  <text x="160" y="171" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff" font-family="sans-serif">J</text>
  <!-- Title -->
  <text x="100" y="20" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff" font-family="sans-serif">🏰</text>
</svg>
